name: Deploy Data to EC2 Privada (MySQL)

on:
  push:
    branches:
      - deploy
    paths:
      - 'docker-compose.data.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # PASO 1: Forzar limpieza e instalación limpia de Buildx (x86_64)
      - name: Purge and Install Buildx Globally
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo rm -rf /usr/libexec/docker/cli-plugins/docker-buildx
            sudo rm -rf /home/ec2-user/.docker/cli-plugins/docker-buildx
            
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64 -o /usr/libexec/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx

      # PASO 2: Validar entorno e Instalar Docker Compose Manualmente
      - name: Verify Docker and Install Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo dnf install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker
            
            # Inyección manual de Docker Compose v2 para evitar errores de comandos flags
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose

      # PASO 3: Despliegue de la Base de Datos MySQL
      - name: Deploy MySQL Database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app
            
            sudo git config --global --add safe.directory /home/ec2-user/app
            if [ ! -d ".git" ]; then
              sudo git init
              sudo git remote add origin https://github.com/benjawl-alt/Prueba2-Innovatech.git
            fi
            
            sudo git fetch origin deploy
            sudo git reset --hard origin/deploy
            
            sudo docker compose -f docker-compose.data.yml up -d --build
