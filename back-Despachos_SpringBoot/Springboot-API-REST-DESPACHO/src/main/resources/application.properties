spring.application.name=Springboot-API-REST
server.port=8081
spring.web.allow-cors=true

# Configuración correcta de MySQL 8.0 en EC2 Privada (Con llave pública permitida)
spring.datasource.url=jdbc:mysql://10.0.3.45:3306/grupo_cordillera_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.platform=mysql

# Configuración de Hibernate
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html