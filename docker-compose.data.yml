version: '3.8'

services:
  db-data:
    image: mysql:8.0
    container_name: app-db-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grupo_cordillera_db  
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: