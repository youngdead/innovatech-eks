apiVersion: apps/v1
kind: Deployment


metadata:

  name: mysql

  namespace: tienda



spec:


  replicas: 1



  selector:


    matchLabels:


      app: mysql



  template:


    metadata:


      labels:


        app: mysql



    spec:


      containers:



      - name: mysql



        image: mysql:8.0



        ports:



        - containerPort: 3306



        env:



        - name: MYSQL_ROOT_PASSWORD


          value: root



        - name: MYSQL_DATABASE


          value: grupo_cordillera_db



        volumeMounts:



        - name: mysql-storage


          mountPath: /var/lib/mysql



      volumes:



      - name: mysql-storage


        emptyDir: {}