apiVersion: v1
kind: Service

metadata:

  name: mysql

  namespace: tienda


spec:

  selector:

    app: mysql


  ports:

  - port: 3306

    targetPort: 3306




---


apiVersion: v1
kind: Service


metadata:

  name: backend-ventas

  namespace: tienda



spec:


  selector:


    app: backend-ventas



  ports:


  - port: 8081

    targetPort: 8081




---


apiVersion: v1
kind: Service

metadata:
  name: backend-despacho
  namespace: tienda

spec:
  type: LoadBalancer 

  selector:
    app: backend-despacho
    
  ports:
  - port: 80
    targetPort: 8082




---


apiVersion: v1
kind: Service

metadata:
  name: frontend
  namespace: tienda

spec:
  type: LoadBalancer

  selector:
    app: frontend

  ports:
  - port: 80
    targetPort: 80